<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      .bg { fill: #001a33; }
      .border { stroke: #00D9FF; stroke-width: 8; }
      .bubble1 { fill: #00D9FF; }
      .bubble2 { fill: #4DD0E1; }
      .line { stroke: #B39DDB; stroke-width: 3; }
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" class="bg border"/>

  <!-- Chat bubbles -->
  <ellipse cx="70" cy="100" rx="40" ry="50" class="bubble1" stroke="white" stroke-width="2"/>
  <ellipse cx="140" cy="120" rx="50" ry="40" class="bubble2" stroke="white" stroke-width="2"/>

  <!-- Inner circle -->
  <circle cx="70" cy="100" r="24" class="bg" stroke="#00D9FF" stroke-width="2"/>

  <!-- Tech lines -->
  <line x1="30" y1="50" x2="50" y2="50" class="line"/>
  <line x1="30" y1="75" x2="50" y2="75" class="line"/>
  <line x1="30" y1="100" x2="50" y2="100" class="line"/>
  <line x1="150" y1="50" x2="170" y2="50" class="line"/>
  <line x1="150" y1="75" x2="170" y2="75" class="line"/>
  <line x1="150" y1="100" x2="170" y2="100" class="line"/>
</svg>